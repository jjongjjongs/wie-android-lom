name: LOM WIE diagnostic

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install X11 runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libxkbcommon-x11-0 libx11-xcb1 libxcb-xkb1

      - name: Build wie_cli
        run: cargo build --release -p wie_cli

      - name: Run Legend of Master diagnostic
        run: |
          set +e
          timeout 45s xvfb-run -a ./target/release/wie_cli test_games/legend_of_master.zip > stdout.log 2>&1
          echo $? > exit_code.txt

      - name: Upload diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: lom-wie-diagnostic
          path: |
            stdout.log
            exit_code.txt
            test_games/legend_of_master.zip

      - name: Upload wie_cli
        uses: actions/upload-artifact@v4
        with:
          name: wie-cli-linux
          path: target/release/wie_cli

