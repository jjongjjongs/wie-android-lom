name: LOM WIE diagnostic

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build/runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config xvfb \
            libasound2-dev libudev-dev libxkbcommon-dev \
            libwayland-dev libx11-dev libxi-dev libgl1-mesa-dev \
            libjack-jackd2-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Build wie_cli
        run: cargo build --release -p wie_cli

      - name: Run Legend of Master for 45 seconds
        shell: bash
        run: |
          set +e
          mkdir -p diagnostic
          export RUST_LOG=trace
          timeout 45s xvfb-run -a -s '-screen 0 1024x768x24' \
            ./target/release/wie_cli test_games/legend_of_master.zip \
            > diagnostic/stdout.log 2> diagnostic/stderr.log
          rc=$?
          echo "$rc" > diagnostic/exit_code.txt
          cp test_games/legend_of_master.zip diagnostic/
          echo "wie_cli exit code: $rc"
          tail -n 250 diagnostic/stderr.log || true
          exit 0

      - name: Upload diagnostic logs
        uses: actions/upload-artifact@v4
        with:
          name: lom-wie-diagnostic
          path: diagnostic/
          if-no-files-found: error

      - name: Upload Linux diagnostic executable
        uses: actions/upload-artifact@v4
        with:
          name: wie-cli-linux
          path: target/release/wie_cli
          if-no-files-found: error
